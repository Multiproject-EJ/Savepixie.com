name: Verify SavePixie

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - name: Check TypeScript
        run: npm run typecheck
      - name: Check formatting
        run: npm run lint
      - name: Verify demo and live launch modes
        run: npm run verify:launch-modes
